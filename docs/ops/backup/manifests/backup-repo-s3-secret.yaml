# S3 / MinIO 备份凭证 Secret 模板
# 请勿将真实凭证提交到 Git；使用 Sealed Secrets / External Secrets 管理
#
# 创建命令示例：
#   kubectl -n reddwarf-storage create secret generic pgbackrest-s3-creds \
#     --from-literal=PGBACKREST_REPO1_S3_KEY=<key> \
#     --from-literal=PGBACKREST_REPO1_S3_KEY_SECRET=<secret> \
#     --dry-run=client -o yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: pgbackrest-s3-creds
  namespace: reddwarf-storage
  labels:
    app: pgbackrest-backup
type: Opaque
stringData:
  PGBACKREST_REPO1_S3_KEY: "REPLACE_WITH_ACCESS_KEY"
  PGBACKREST_REPO1_S3_KEY_SECRET: "REPLACE_WITH_SECRET_KEY"

---
# PGO 专用 Secret 命名（key 名遵循 PGO repo1-s3-* 约定）
apiVersion: v1
kind: Secret
metadata:
  name: reddwarf-postgresql-pgbackrest-s3
  namespace: reddwarf-storage
  labels:
    app: pgbackrest-backup
    postgres-operator.crunchydata.com/cluster: reddwarf-postgresql
type: Opaque
stringData:
  repo1-s3-key: "REPLACE_WITH_ACCESS_KEY"
  repo1-s3-key-secret: "REPLACE_WITH_SECRET_KEY"

---
# MinIO Bucket 创建 Job（一次性，需集群内可访问 MinIO）
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-backup-bucket
  namespace: reddwarf-storage
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root-creds        # 按实际 Secret 名修改
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root-creds
                  key: rootPassword
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set local http://minio.reddwarf-storage.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing local/texhub-pg-backup
              mc ilm rule add local/texhub-pg-backup --expire-days 90 || true
              echo "Bucket texhub-pg-backup ready"
